<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל בחירות - מערכת שליטה</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .timer-bar { background: #1877f2; color: white; text-align: center; padding: 15px; font-size: 32px; font-weight: bold; border-radius: 12px; margin-bottom: 20px; }
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-green { background: #00a400; color: white; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-purple { background: #6a1b9a; color: white; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; }
        .search-zone { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; }
        .progress-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .progress-bar { height: 20px; background: #e4e6eb; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: #00a400; width: 0%; transition: width 0.3s; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #f0f2f5; text-align: right; }
        .voted-row { background-color: #f9fafb; color: #8d949e; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="timer-bar" id="countdown-display">00:00:00</div>

<div class="action-buttons">
    <button class="btn-green" id="whatsapp-report-btn">שלח דוח חמ"ל בוואטסאפ</button>
    <button class="btn-purple" id="manage-users-btn">ניהול משתמשים</button>
</div>

<div class="search-zone">
    <input type="text" id="search-bar" placeholder="חפש לפי שם, כתובת, מסד או טלפון..." style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ddd;">
    <button id="unvoted-toggle" style="padding: 10px;">הצג רק מי שטרם הצביע</button>
</div>

<div class="progress-container">
    <div style="display:flex; justify-content: space-between;">
        <span>קצב התקדמות ההצבעות בחמ"ל</span>
        <span id="progress-percentage-label">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="voters-progress-bar"></div></div>
    <p id="progress-bar-text">0 מתוך 0 הצביעו</p>
</div>

<div class="dashboard-grid">
    <div class="side-panel">
        <div class="card"><canvas id="votingPieChart" height="200"></canvas></div>
        <div class="card"><canvas id="managersBarChart" height="200"></canvas></div>
    </div>
    <div class="main-panel">
        <div class="card">
            <h2>👥 פנקס בוחרים פעיל</h2>
            <table>
                <thead><tr><th>מסד</th><th>שם</th><th>כתובת</th><th>טלפון</th><th>סטטוס</th></tr></thead>
                <tbody id="voters-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
