<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל בחירות</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js for visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV Import -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Rubik', sans-serif;
        }
        .reminder-active {
            background-color: #fef08a !important; /* צבע צהוב בולט לשורת תזכורת */
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <!-- Login Container -->
    <div id="login-container" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md mx-4 text-center">
            <h1 class="text-2xl font-bold mb-6 text-gray-900">חמ"ל בחירות - התחברות</h1>
            <input type="password" id="access-code-input" class="w-full px-4 py-3 border rounded-lg text-center text-2xl tracking-widest mb-4" placeholder="קוד גישה">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                התחבר
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden">קוד גישה שגוי, אנא נסה שנית.</p>
        </div>
    </div>

    <!-- App Wrapper -->
    <div id="app-container" class="hidden">
        <!-- Navbar -->
        <header class="bg-blue-600 text-white px-6 py-4 flex items-center justify-between shadow-md">
            <div class="flex items-center space-x-4 space-x-reverse">
                <span class="font-bold text-xl">חמ"ל בחירות</span>
                <span id="user-badge" class="bg-blue-800 text-xs px-2.5 py-1 rounded"></span>
            </div>
            <button onclick="handleLogout()" class="hover:text-gray-200"><i class="fa-solid fa-right-from-bracket text-lg"></i></button>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto p-6">
            
            <!-- Admin Section -->
            <section id="admin-dashboard" class="mb-8 hidden">
                <!-- Stats Grid -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-lg shadow-sm border">
                        <p class="text-gray-500 text-sm">סה"כ בוחרים</p>
                        <h3 id="stat-total-voters" class="text-2xl font-bold text-gray-900">0</h3>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border">
                        <p class="text-gray-500 text-sm">הצביעו</p>
                        <h3 id="stat-voted" class="text-2xl font-bold text-green-600">0</h3>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border">
                        <p class="text-gray-500 text-sm">טרם הצביעו</p>
                        <h3 id="stat-not-voted" class="text-2xl font-bold text-amber-600">0</h3>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border">
                        <p class="text-gray-500 text-sm">אחוז הצבעה</p>
                        <h3 id="stat-percent" class="text-2xl font-bold text-blue-600">0%</h3>
                    </div>
                </div>

                <!-- Graphs -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="bg-white p-4 rounded-lg shadow-sm border h-64">
                        <canvas id="votersPieChart"></canvas>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border h-64">
                        <canvas id="responsiblesBarChart"></canvas>
                    </div>
                </div>

                <!-- Admin Actions -->
                <div class="bg-white p-4 rounded-lg shadow-sm border flex flex-wrap gap-4 items-center justify-between mb-6">
                    <div class="flex items-center space-x-4 space-x-reverse">
                        <label class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded cursor-pointer transition">
                            <i class="fa-solid fa-file-import ml-1"></i> טען קובץ CSV
                            <input type="file" id="csv-file-input" accept=".csv" class="hidden" onchange="importCSV(event)">
                        </label>
                        <button onclick="clearDatabase()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition">
                            <i class="fa-solid fa-trash-can ml-1"></i> מחק פנקס
                        </button>
                    </div>
                    <button onclick="generateWhatsAppReport()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                        <i class="fa-brands fa-whatsapp ml-1 text-lg"></i> דוח לוואטסאפ
                    </button>
                </div>
            </section>

            <!-- Filters -->
            <section class="bg-white p-4 rounded-lg shadow-sm border mb-6 flex flex-wrap gap-4 items-center">
                <input type="text" id="search-input" oninput="filterVoters()" class="border p-2 rounded w-full md:w-64" placeholder="חיפוש חופשי...">
                <select id="status-filter" onchange="filterVoters()" class="border p-2 rounded">
                    <option value="all">כל הסטטוסים</option>
                    <option value="voted">הצביעו</option>
                    <option value="not-voted">טרם הצביעו</option>
                    <option value="reminder">עם תזכורת</option>
                </select>
                <div id="responsible-filter-container" class="hidden">
                    <select id="responsible-filter" onchange="filterVoters()" class="border p-2 rounded">
                        <option value="all">כל האחראים</option>
                    </select>
                </div>
                <div class="mr-auto">
                    <span class="text-sm text-gray-500">מציג <span id="displayed-count" class="font-bold">0</span> מתוך <span id="total-count" class="font-bold">0</span></span>
                </div>
            </section>

            <!-- Table -->
            <section class="bg-white rounded-lg shadow-sm border overflow-hidden">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b text-gray-600 text-sm font-semibold">
                            <th class="p-3">מזהה</th>
                            <th class="p-3">שם</th>
                            <th class="p-3">כתובת</th>
                            <th class="p-3">טלפון</th>
                            <th class="p-3">אחראי</th>
                            <th class="p-3 text-center">סטטוס</th>
                            <th class="p-3 text-center">תזכורת</th>
                        </tr>
                    </thead>
                    <tbody id="voters-table-body" class="divide-y text-sm">
                        <tr>
                            <td colspan="7" class="p-6 text-center text-gray-400">טוען נתונים...</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Voter Modal Card -->
    <div id="voter-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-lg shadow-lg overflow-hidden flex flex-col">
            <!-- Modal Header -->
            <div class="bg-gray-800 text-white p-4 flex justify-between items-center">
                <div>
                    <span id="modal-badge-id" class="text-xs bg-gray-700 px-2 py-0.5 rounded"></span>
                    <h3 id="modal-voter-name" class="text-lg font-bold mt-1">טוען...</h3>
                    <p id="modal-voter-address" class="text-gray-400 text-xs"></p>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <!-- Modal Body -->
            <div class="p-6 space-y-4 overflow-y-auto max-h-[70vh]">
                <!-- Phone and Vote Status -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-3 rounded border flex items-center justify-between">
                        <div>
                            <p class="text-xs text-gray-400">טלפון</p>
                            <p id="modal-voter-phone" class="font-bold text-gray-800"></p>
                        </div>
                        <a id="modal-phone-call-btn" href="#" class="bg-blue-600 text-white p-2 rounded-full hover:bg-blue-700">
                            <i class="fa-solid fa-phone"></i>
                        </a>
                    </div>
                    <div class="bg-gray-50 p-3 rounded border flex items-center justify-between">
                        <div>
                            <p class="text-xs text-gray-400">סטטוס הצבעה</p>
                            <p id="modal-voter-status-lbl" class="font-bold"></p>
                        </div>
                        <button id="modal-toggle-vote-btn" onclick="toggleVoteState()" class="px-3 py-1.5 rounded font-bold text-xs"></button>
                    </div>
                </div>

                <!-- Driver dispatch -->
                <div class="border-t pt-4">
                    <h4 class="text-sm font-bold mb-2">שליחת נהג</h4>
                    <div class="flex gap-2">
                        <input type="text" id="driver-phone-input" class="border p-2 rounded text-sm flex-1" placeholder="טלפון של הנהג">
                        <button onclick="sendDriverWhatsApp()" class="bg-green-600 hover:bg-green-700 text-white font-bold text-sm px-4 py-2 rounded">
                            שלח נהג
                        </button>
                    </div>
                </div>

                <!-- Reminders Form (WITH CLOCK UPDATE FIX) -->
                <div class="border-t pt-4">
                    <h4 class="text-sm font-bold mb-2">תזכורת חזרה לבוחר</h4>
                    <div class="space-y-3">
                        <div class="flex gap-2">
                            <button onclick="setReminderQuickOffset(20)" class="bg-amber-100 hover:bg-amber-200 text-amber-800 text-xs font-semibold py-1 px-2.5 rounded">עוד 20 דק'</button>
                            <button onclick="setReminderQuickOffset(30)" class="bg-amber-100 hover:bg-amber-200 text-amber-800 text-xs font-semibold py-1 px-2.5 rounded">עוד חצי שעה</button>
                            <button onclick="setReminderQuickOffset(60)" class="bg-amber-100 hover:bg-amber-200 text-amber-800 text-xs font-semibold py-1 px-2.5 rounded">עוד שעה</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs text-gray-500 block mb-1">שעת התזכורת</label>
                                <input type="time" id="reminder-time-input" class="w-full border p-2 rounded text-sm">
                            </div>
                            <div>
                                <label class="text-xs text-gray-500 block mb-1">תוכן התזכורת</label>
                                <input type="text" id="reminder-desc-input" class="w-full border p-2 rounded text-sm" placeholder="פרטים נוספים">
                            </div>
                        </div>
                        <div class="flex justify-end gap-2">
                            <button onclick="clearVoterReminder()" class="bg-red-100 text-red-700 text-xs font-bold px-3 py-1.5 rounded hover:bg-red-200">מחק תזכורת</button>
                            <button onclick="saveVoterReminder()" class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-3 py-1.5 rounded">שמור תזכורת</button>
                        </div>
                    </div>
                </div>

                <!-- Notes (Debounced) -->
                <div class="border-t pt-4">
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-bold">הערות</label>
                        <span id="notes-status" class="text-xs text-gray-400">שמור</span>
                    </div>
                    <textarea id="modal-voter-notes" oninput="onNotesInput(this.value)" rows="2" class="w-full border p-2 rounded text-sm" placeholder="הקלד הערה..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // CONFIG & ROLES
        const ROLES_CONFIG = {
            "1111": { name: "מנהל", role: "admin", allowed_responsibles: [] },
            "2222": { name: "אבי", role: "user", allowed_responsibles: ["אבי"] },
            "3333": { name: "ירון", role: "user", allowed_responsibles: ["ירון"] }
        };

        // Firebase Setup (החלף בנתונים שלך)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let votersData = [];
        let currentEditingVoterId = null;
        let debounceTimer = null;
        let activeReminders = {};
        let pieChart = null;
        let barChart = null;

        setInterval(checkRemindersClock, 10000); // בדוק תזכורות פעילות פעם ב-10 שניות

        // LOGIN
        function handleLogin() {
            const code = document.getElementById('access-code-input').value.trim();
            if (ROLES_CONFIG[code]) {
                currentUser = ROLES_CONFIG[code];
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('user-badge').textContent = `${currentUser.name} (${currentUser.role === 'admin' ? 'מנהל' : 'נציג'})`;
                
                if (currentUser.role === 'admin') {
                    document.getElementById('admin-dashboard').classList.remove('hidden');
                    document.getElementById('responsible-filter-container').classList.remove('hidden');
                } else {
                    document.getElementById('admin-dashboard').classList.add('hidden');
                    document.getElementById('responsible-filter-container').classList.add('hidden');
                }
                initRealtimeSync();
            } else {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 5000);
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('access-code-input').value = '';
        }

        // REALTIME SYNC
        function initRealtimeSync() {
            db.collection("voters").onSnapshot((snapshot) => {
                const temp = [];
                snapshot.forEach((doc) => {
                    temp.push({ id: doc.id, ...doc.data() });
                });
                votersData = temp;
                if (currentUser && currentUser.role === 'admin') {
                    populateResponsibleFilter();
                }
                renderVotersTable();
                updateDashboard();
            });
        }

        // CSV IMPORT (WITH COMBINED 3 ADDRESS FIELDS FIX)
        function importCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    const batch = db.batch();
                    const rawData = results.data;
                    let count = 0;

                    for (const row of rawData) {
                        const firstName = row['שם פרטי'] || '';
                        const lastName = row['שם משפחה'] || '';
                        const fullName = row['שם מלא'] || `${firstName} ${lastName}`.trim();
                        const voterId = row['מסד'] || row['מזהה'] || row['תעודת זהות'] || Math.random().toString(36).substr(2, 9);
                        const phone = row['טלפון'] || row['נייד'] || row['טלפון נייד'] || '';

                        // FIX: משיכה מבוקרת של 3 שדות הכתובת ואיחודם
                        const street = row['רחוב'] ? String(row['רחוב']).trim() : '';
                        const houseNo = row['מס בית'] || row['מספר בית'] || row['בית'] ? String(row['מס בית'] || row['מספר בית'] || row['בית']).trim() : '';
                        const city = row['עיר'] || row['ישוב'] ? String(row['עיר'] || row['ישוב']).trim() : '';

                        const addressParts = [];
                        if (street) {
                            if (houseNo) {
                                addressParts.push(`${street} ${houseNo}`);
                            } else {
                                addressParts.push(street);
                            }
                        } else if (houseNo) {
                            addressParts.push(`בית ${houseNo}`);
                        }
                        
                        if (city) {
                            addressParts.push(city);
                        }

                        const combinedAddress = addressParts.join(', ') || 'לא צוינה כתובת';
                        const responsible = row['אחראי'] || 'ללא שיוך';

                        const docRef = db.collection("voters").doc(voterId);
                        batch.set(docRef, {
                            id: voterId,
                            name: fullName || 'ללא שם',
                            phone: phone,
                            address: combinedAddress,
                            responsible: responsible,
                            voted: false,
                            notes: "",
                            reminderText: "",
                            reminderTime: null,
                            hasReminder: false
                        });
                        count++;
                    }

                    try {
                        await batch.commit();
                        alert(`הפנקס יובא בהצלחה! ${count} בוחרים נרשמו.`);
                    } catch (err) {
                        console.error(err);
                        alert("שגיאה בייבוא הנתונים.");
                    }
                }
            });
        }

        async function clearDatabase() {
            if (confirm("האם למחוק את כל הבוחרים מהמערכת?")) {
                const snapshot = await db.collection("voters").get();
                const batch = db.batch();
                snapshot.docs.forEach((doc) => batch.delete(doc.ref));
                await batch.commit();
                alert("הפנקס אופס.");
            }
        }

        // RENDER & FILTERS
        function populateResponsibleFilter() {
            const filterSelect = document.getElementById('responsible-filter');
            const responsibles = [...new Set(votersData.map(v => v.responsible))].filter(Boolean);
            filterSelect.innerHTML = '<option value="all">כל האחראים</option>';
            responsibles.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                filterSelect.appendChild(opt);
            });
        }

        function filterVoters() {
            renderVotersTable();
        }

        function renderVotersTable() {
            const tableBody = document.getElementById('voters-table-body');
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            const responsibleFilter = document.getElementById('responsible-filter') ? document.getElementById('responsible-filter').value : 'all';

            let filtered = votersData.filter(voter => {
                if (currentUser.role !== 'admin') {
                    if (!currentUser.allowed_responsibles.includes(voter.responsible)) return false;
                } else {
                    if (responsibleFilter !== 'all' && voter.responsible !== responsibleFilter) return false;
                }

                if (statusFilter === 'voted' && !voter.voted) return false;
                if (statusFilter === 'not-voted' && voter.voted) return false;
                if (statusFilter === 'reminder' && !voter.hasReminder) return false;

                const nameMatch = (voter.name || '').toLowerCase().includes(searchVal);
                const phoneMatch = (voter.phone || '').includes(searchVal);
                const addressMatch = (voter.address || '').toLowerCase().includes(searchVal);
                const idMatch = (voter.id || '').includes(searchVal);

                return nameMatch || phoneMatch || addressMatch || idMatch;
            });

            document.getElementById('displayed-count').textContent = filtered.length;
            document.getElementById('total-count').textContent = (currentUser.role === 'admin') ? votersData.length : votersData.filter(v => currentUser.allowed_responsibles.includes(v.responsible)).length;

            tableBody.innerHTML = '';

            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-gray-400">לא נמצאו תוצאות.</td></tr>`;
                return;
            }

            filtered.forEach(voter => {
                const tr = document.createElement('tr');
                tr.className = `cursor-pointer hover:bg-gray-50 transition ${voter.hasReminder ? 'reminder-active' : ''}`;
                tr.onclick = () => openVoterModal(voter.id);

                const statusHTML = voter.voted 
                    ? `<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">הצביע</span>`
                    : `<span class="bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded-full">טרם הצביע</span>`;

                const reminderHTML = voter.hasReminder
                    ? `<span class="text-amber-600 font-bold text-xs"><i class="fa-solid fa-bell ml-1"></i> ${voter.reminderTime}</span>`
                    : `<span class="text-gray-300">-</span>`;

                tr.innerHTML = `
                    <td class="p-3 font-mono font-bold text-gray-500">${voter.id}</td>
                    <td class="p-3 font-semibold text-gray-900">${voter.name}</td>
                    <td class="p-3 text-gray-600">${voter.address}</td>
                    <td class="p-3 font-mono text-gray-600">${voter.phone || ''}</td>
                    <td class="p-3 text-gray-600">${voter.responsible}</td>
                    <td class="p-3 text-center">${statusHTML}</td>
                    <td class="p-3 text-center">${reminderHTML}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // STATS & GRAPHS
        function updateDashboard() {
            if (currentUser.role !== 'admin') return;

            const total = votersData.length;
            const voted = votersData.filter(v => v.voted).length;
            const notVoted = total - voted;
            const percent = total > 0 ? Math.round((voted / total) * 100) : 0;

            document.getElementById('stat-total-voters').textContent = total;
            document.getElementById('stat-voted').textContent = voted;
            document.getElementById('stat-not-voted').textContent = notVoted;
            document.getElementById('stat-percent').textContent = `${percent}%`;

            drawCharts(voted, notVoted);
        }

        function drawCharts(voted, notVoted) {
            const ctxPie = document.getElementById('votersPieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['הצביעו', 'טרם הצביעו'],
                    datasets: [{
                        data: [voted, notVoted],
                        backgroundColor: ['#22c55e', '#f59e0b']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const resMap = {};
            votersData.forEach(v => {
                if (!resMap[v.responsible]) resMap[v.responsible] = { total: 0, voted: 0 };
                resMap[v.responsible].total++;
                if (v.voted) resMap[v.responsible].voted++;
            });

            const labels = Object.keys(resMap);
            const totalData = labels.map(l => resMap[l].total);
            const votedData = labels.map(l => resMap[l].voted);

            const ctxBar = document.getElementById('responsiblesBarChart').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'משויכים', data: totalData, backgroundColor: '#94a3b8' },
                        { label: 'הצביעו', data: votedData, backgroundColor: '#22c55e' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // VOTER MODAL
        function openVoterModal(voterId) {
            const voter = votersData.find(v => v.id === voterId);
            if (!voter) return;

            currentEditingVoterId = voterId;

            document.getElementById('modal-badge-id').textContent = `מזהה: ${voter.id}`;
            document.getElementById('modal-voter-name').textContent = voter.name;
            document.getElementById('modal-voter-address').textContent = voter.address;
            document.getElementById('modal-voter-phone').textContent = voter.phone || 'אין טלפון';

            const callBtn = document.getElementById('modal-phone-call-btn');
            if (voter.phone) {
                callBtn.href = `tel:${voter.phone}`;
                callBtn.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                callBtn.removeAttribute('href');
                callBtn.classList.add('opacity-50', 'pointer-events-none');
            }

            updateModalVoteButtonState(voter.voted);

            // טעינת שדות תזכורת
            document.getElementById('reminder-desc-input').value = voter.reminderText || '';
            if (voter.hasReminder && voter.reminderTime) {
                document.getElementById('reminder-time-input').value = voter.reminderTime;
            } else {
                // דיפולט: שעה מעכשיו
                const now = new Date();
                now.setHours(now.getHours() + 1);
                const HH = String(now.getHours()).padStart(2, '0');
                const MM = String(now.getMinutes()).padStart(2, '0');
                document.getElementById('reminder-time-input').value = `${HH}:${MM}`;
            }

            document.getElementById('modal-voter-notes').value = voter.notes || '';
            document.getElementById('notes-status').textContent = 'שמור';

            document.getElementById('voter-modal').classList.remove('hidden');
            document.getElementById('voter-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('voter-modal').classList.add('hidden');
            document.getElementById('voter-modal').classList.remove('flex');
            currentEditingVoterId = null;
        }

        function updateModalVoteButtonState(voted) {
            const lbl = document.getElementById('modal-voter-status-lbl');
            const btn = document.getElementById('modal-toggle-vote-btn');
            if (voted) {
                lbl.textContent = "הצביע";
                lbl.className = "font-bold text-green-600";
                btn.textContent = "בטל סימון";
                btn.className = "bg-gray-200 text-gray-700 px-3 py-1.5 rounded text-xs font-bold";
            } else {
                lbl.textContent = "טרם הצביע";
                lbl.className = "font-bold text-amber-500";
                btn.textContent = "סמן כהצביע";
                btn.className = "bg-green-600 text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-green-700";
            }
        }

        async function toggleVoteState() {
            if (!currentEditingVoterId) return;
            const voter = votersData.find(v => v.id === currentEditingVoterId);
            if (!voter) return;

            const next = !voter.voted;
            await db.collection("voters").doc(currentEditingVoterId).update({ voted: next });
            updateModalVoteButtonState(next);
        }

        // DEBOUNCED NOTES
        function onNotesInput(text) {
            document.getElementById('notes-status').textContent = 'מקליד...';
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                if (!currentEditingVoterId) return;
                try {
                    await db.collection("voters").doc(currentEditingVoterId).update({ notes: text });
                    document.getElementById('notes-status').textContent = 'שמור ✓';
                } catch {
                    document.getElementById('notes-status').textContent = 'שגיאה ✗';
                }
            }, 800);
        }

        // REMINDER FIXES (DYNAMIC TIME UPDATER & FULL CLEAR)
        function setReminderQuickOffset(minutes) {
            const now = new Date();
            now.setMinutes(now.getMinutes() + minutes);
            const HH = String(now.getHours()).padStart(2, '0');
            const MM = String(now.getMinutes()).padStart(2, '0');
            
            // עדכון השעון הויזואלי במודאל
            document.getElementById('reminder-time-input').value = `${HH}:${MM}`;
        }

        async function saveVoterReminder() {
            if (!currentEditingVoterId) return;
            const timeVal = document.getElementById('reminder-time-input').value;
            const descVal = document.getElementById('reminder-desc-input').value.trim();

            if (!timeVal) {
                alert("נא להזין שעת תזכורת.");
                return;
            }

            await db.collection("voters").doc(currentEditingVoterId).update({
                reminderTime: timeVal,
                reminderText: descVal || "חזרה לבוחר",
                hasReminder: true
            });
            alert("תזכורת נשמרה!");
            closeModal();
        }

        async function clearVoterReminder() {
            if (!currentEditingVoterId) return;
            try {
                // מחיקה מוחלטת ומאובטחת של כל שדות התזכורת בשרת
                await db.collection("voters").doc(currentEditingVoterId).update({
                    reminderTime: null,
                    reminderText: "",
                    hasReminder: false
                });

                // ניקוי תיבות הטקסט במודאל
                document.getElementById('reminder-desc-input').value = "";
                document.getElementById('reminder-time-input').value = "";
                
                // הסרה ממערך הטריגרים הפעיל
                delete activeReminders[currentEditingVoterId];

                alert("התזכורת נמחקה לחלוטין!");
                closeModal();
            } catch (err) {
                console.error("שגיאה במחיקת תזכורת:", err);
            }
        }

        function checkRemindersClock() {
            const now = new Date();
            const currentHHMM = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            votersData.forEach(voter => {
                if (voter.hasReminder && voter.reminderTime === currentHHMM) {
                    const key = `${voter.id}_${voter.reminderTime}`;
                    if (!activeReminders[key]) {
                        activeReminders[key] = true;
                        alert(`🔔 תזכורת: ${voter.name}\nטלפון: ${voter.phone || 'אין'}\nהערה: ${voter.reminderText}`);
                    }
                }
            });
        }

        // COMMUNICATIONS
        function sendDriverWhatsApp() {
            const driverPhone = document.getElementById('driver-phone-input').value.trim();
            if (!driverPhone) {
                alert("אנא הזן מספר טלפון של הנהג.");
                return;
            }
            const voter = votersData.find(v => v.id === currentEditingVoterId);
            if (!voter) return;

            const msg = `נסיעה לבוחר לקלפי:\n\n👤 *שם:* ${voter.name}\n📍 *כתובת:* ${voter.address}\n📞 *טלפון:* ${voter.phone || 'לא קיים'}`;
            let formatted = driverPhone.replace(/\D/g, '');
            if (formatted.startsWith('05')) formatted = '972' + formatted.substr(1);

            window.open(`https://api.whatsapp.com/send?phone=${formatted}&text=${encodeURIComponent(msg)}`, '_blank');
        }

        function generateWhatsAppReport() {
            if (currentUser.role !== 'admin') return;

            const total = votersData.length;
            const voted = votersData.filter(v => v.voted).length;
            const percent = total > 0 ? Math.round((voted / total) * 100) : 0;

            const resMap = {};
            votersData.forEach(v => {
                if (!resMap[v.responsible]) resMap[v.responsible] = { total: 0, voted: 0 };
                resMap[v.responsible].total++;
                if (v.voted) resMap[v.responsible].voted++;
            });

            let breakdown = '';
            Object.keys(resMap).forEach(key => {
                const subT = resMap[key].total;
                const subV = resMap[key].voted;
                const subP = subT > 0 ? Math.round((subV / subT) * 100) : 0;
                breakdown += `🔹 *${key}:* ${subP}% (${subV}/${subT})\n`;
            });

            const now = new Date();
            const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            const report = `📊 *סטטוס חמ"ל בחירות לשעה ${time}* 📊\n\n🎯 *אחוז הצבעה כללי:* ${percent}% (${voted}/${total} מצביעים)\n\n📈 *סטטוס לפי אחראים:*\n${breakdown}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(report)}`, '_blank');
        }
    </script>
