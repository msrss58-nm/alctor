<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת חמ"ל בחירות</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        #main-dashboard { display: none; }
        #login-screen { padding: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>מערכת חמ"ל סגורה 🔒</h2>
        <input type="password" id="pass-input" placeholder="הכנס קוד גישה">
        <button id="login-btn">התחבר למערכת</button>
        <p id="login-error" style="display:none; color:red;">קוד שגוי!</p>
    </div>

    <div id="main-dashboard">
        <h2 id="main-title">שלום</h2>
        <div id="countdown-display"></div>
        <table border="1">
            <thead>
                <tr><th>מסד</th><th>שם</th><th>סטטוס</th></tr>
            </thead>
            <tbody id="voters-table-body"></tbody>
        </table>
    </div>

    <div id="voter-modal" class="modal">
        <div style="background:white; padding:20px;">
            <h3 id="modal-voter-name"></h3>
            <button id="modal-btn-toggle-vote">שינוי סטטוס</button>
            <button id="close-modal-btn">סגור</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
